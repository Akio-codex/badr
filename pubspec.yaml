name: badr
description: "تطبيق بدر - القرآن الكريم والأذكار والصلاة"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  shimmer: ^3.0.0

  # ═══════════════════════════════
  #  الشبكة والـ API
  # ═══════════════════════════════
  dio: ^5.7.0
  connectivity_plus: ^6.1.4

  # ═══════════════════════════════
  #  State Management
  # ═══════════════════════════════
  provider: ^6.1.2

  # ═══════════════════════════════
  #  قاعدة البيانات المحلية
  # ═══════════════════════════════
  sqflite: ^2.3.3+1
  path_provider: ^2.1.5
  path: ^1.9.0

  # ═══════════════════════════════
  #  الإعدادات المحلية
  # ═══════════════════════════════
  shared_preferences: ^2.3.3

  # ═══════════════════════════════
  #  الصوت والتلاوة
  # ═══════════════════════════════
  just_audio: ^0.9.42
  just_audio_background: ^0.0.1-beta.11
  audio_session: ^0.1.21

  # ═══════════════════════════════
  #  الإشعارات والأذان
  # ═══════════════════════════════
  flutter_local_notifications: ^18.0.1
  workmanager: ^0.9.0
  permission_handler: ^11.3.1
  adhan: ^2.0.0+1
  geolocator: ^14.0.2
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/audio/adan.mp3
    - assets/images/logo.png

  fonts:
    - family: Ayat
      fonts:
        - asset: assets/fonts/ayat.otf

    - family: Cairo
      fonts:
        - asset: assets/fonts/cairo.ttf
